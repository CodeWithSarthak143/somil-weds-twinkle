<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="You are cordially invited to celebrate our wedding. Open the doors to reveal our special day.">
    <title>Somil &amp; Twinkle's Wedding Invite</title>
    <link rel="icon" href="images/Group 105.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio
        id="background-music"
        src="images/Heri sakhi mangal gao ri  Heri sakhi mangal gao ri ringtone  Bhajan  Aarti  Bakti Ringtone.mp3"
        preload="auto"
        loop
    ></audio>

    <!-- ===== INTRO SCENE: Palace Facade + Doors ===== -->
    <div id="intro-scene">
        <!-- The full palace facade background -->
        <div id="facade-wrapper">
            <img 
                id="facade-img" 
                src="images/Layer 0.png" 
                alt="Palace Facade" 
                draggable="false"
            >

            <!-- 3D Door Container - positioned over the archway opening -->
            <div id="door-container">
                <div id="door-perspective">
                    <!-- Left Door -->
                    <div id="door-left" class="door-panel">
                        <img src="images/Background copy.png" alt="Left Door" draggable="false">
                    </div>
                    <!-- Right Door -->
                    <div id="door-right" class="door-panel">
                        <img src="images/Background copy 2.png" alt="Right Door" draggable="false">
                    </div>
                </div>

                <!-- Tap Hint Overlay -->
                <div id="tap-hint">
                    <img
                        id="tap-hint-img"
                        src="images/Group 106.png"
                        alt="Tap to Open"
                        draggable="false"
                    >
                </div>
            </div>
        </div>
    </div>

    <!-- ===== INVITATION SCENE: Scratch reveal after doors open ===== -->
    <div id="invitation-scene">
        <canvas id="confetti-canvas" aria-hidden="true"></canvas>

        <div id="scratch-card" aria-live="polite">
            <img
                id="guess-title"
                src="images/Guess the dates.png"
                alt="Guess the dates"
                draggable="false"
            >

            <div id="heart-stage">
                <img
                    id="white-heart"
                    src="images/AdobeStock_2068356440 1.png"
                    alt="12th December 2026"
                    draggable="false"
                >
                <canvas
                    id="scratch-canvas"
                    aria-label="Scratch here to reveal the wedding date"
                ></canvas>
            </div>
        </div>

        <section id="video-scene" aria-label="Wedding invitation video">
            <video
                id="wedding-video"
                src="images/Foot_touching_blue_hand_illustra…_202607121233.mp4"
                playsinline
                muted
                preload="auto"
            ></video>
        </section>

        <main id="website-content" aria-label="Wedding invitation details">
            <div id="invitation-card">
                <div class="ornament-top">&#10022;</div>
                <p class="invitation-subtitle">You are cordially invited to</p>
                <p class="invitation-label">THE WEDDING CELEBRATION OF</p>
                <h1 class="couple-names">
                    <span class="name">Somil</span>
                    <span class="ampersand">&amp;</span>
                    <span class="name">Twinkle</span>
                </h1>
                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-diamond">&#9670;</span>
                    <span class="divider-line"></span>
                </div>
                <div class="event-details">
                    <div class="detail-block">
                        <span class="detail-label">Date</span>
                        <span class="detail-value">Saturday, December 12, 2026</span>
                    </div>
                    <div class="detail-block">
                        <span class="detail-label">Time</span>
                        <span class="detail-value">7:00 PM Onwards</span>
                    </div>
                    <div class="detail-block">
                        <span class="detail-label">Venue</span>
                        <span class="detail-value">Pearl Blue Hotel &amp; Resort</span>
                        <span class="detail-sub">Raisen Road, Bhopal</span>
                    </div>
                </div>
                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-diamond">&#9670;</span>
                    <span class="divider-line"></span>
                </div>
                <p class="rsvp-text">We request the honour of your presence</p>
                <div class="ornament-bottom">&#10022;</div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
